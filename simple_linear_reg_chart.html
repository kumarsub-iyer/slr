<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Linear Regression Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; background-color: #f5f7fb; color: #222; }
        .chart-container { max-width: 900px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 18px 40px rgba(0,0,0,.08); }
        canvas { max-width: 100%; }
        .note { font-size: 0.95rem; margin-top: 8px; color: #555; }
    </style>
</head>
<body>
    <div class="chart-container">
        <h1>Salary vs Years of Experience</h1>
        <p class="note">Test set points plus the fitted regression line.</p>
        <canvas id="regressionChart" width="900" height="500"></canvas>
    </div>
    <script>
        const testPoints = [{"x": 1.5, "y": 37731.0}, {"x": 10.3, "y": 122391.0}, {"x": 4.1, "y": 57081.0}, {"x": 3.9, "y": 63218.0}, {"x": 9.5, "y": 116969.0}, {"x": 8.7, "y": 109431.0}];
        const linePoints = [{"x": 1.1, "y": 37023.93179003027}, {"x": 1.3, "y": 38886.44681537611}, {"x": 1.5, "y": 40748.961840721946}, {"x": 2.0, "y": 45405.24940408654}, {"x": 2.2, "y": 47267.76442943238}, {"x": 2.9, "y": 53786.567018142814}, {"x": 3.0, "y": 54717.824530815735}, {"x": 3.2, "y": 56580.339556161576}, {"x": 3.2, "y": 56580.339556161576}, {"x": 3.7, "y": 61236.62711952617}, {"x": 3.9, "y": 63099.14214487201}, {"x": 4.0, "y": 64030.39965754493}, {"x": 4.0, "y": 64030.39965754493}, {"x": 4.1, "y": 64961.65717021784}, {"x": 4.5, "y": 68686.68722090952}, {"x": 4.9, "y": 72411.7172716012}, {"x": 5.1, "y": 74274.23229694704}, {"x": 5.3, "y": 76136.74732229288}, {"x": 5.9, "y": 81724.2923983304}, {"x": 6.0, "y": 82655.54991100331}, {"x": 6.8, "y": 90105.61001238666}, {"x": 7.1, "y": 92899.38255040543}, {"x": 7.9, "y": 100349.44265178878}, {"x": 8.2, "y": 103143.21518980752}, {"x": 8.7, "y": 107799.50275317213}, {"x": 9.0, "y": 110593.27529119089}, {"x": 9.5, "y": 115249.56285455548}, {"x": 9.6, "y": 116180.8203672284}, {"x": 10.3, "y": 122699.62295593884}, {"x": 10.5, "y": 124562.13798128469}];
        const ctx = document.getElementById('regressionChart').getContext('2d');
        new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [
                    { label: 'Test set (actual)', data: testPoints, backgroundColor: 'rgba(220, 53, 69, 0.8)', borderColor: 'rgba(220, 53, 69, 1)', pointRadius: 6, showLine: false },
                    { label: 'Regression line', data: linePoints, type: 'line', fill: false, borderColor: 'rgba(0, 123, 255, 0.9)', pointRadius: 0, borderWidth: 2, tension: 0 }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    x: { title: { display: true, text: 'YearsExperience' } },
                    y: { title: { display: true, text: 'Salary' } }
                }
            }
        });
    </script>
</body>
</html>
